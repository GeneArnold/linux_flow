<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Microphone capsule body -->
  <rect x="35" y="5" width="30" height="52" rx="15" fill="#d0d0d0"/>
  <!-- Pickup arc curves around the bottom of the capsule -->
  <path d="M 15 47 Q 15 78 50 78 Q 85 78 85 47"
        fill="none" stroke="#d0d0d0" stroke-width="6" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="46" y="78" width="8" height="13" fill="#d0d0d0"/>
  <!-- Base -->
  <rect x="27" y="91" width="46" height="8" rx="4" fill="#d0d0d0"/>
</svg>
